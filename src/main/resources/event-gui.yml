# EventSMP - GUI Configuration
# Full control over the Events GUI layout and appearance.
# For Support visit: https://discord.com/invite/FwRtcAdsTC
# I will gladly assist you in configuration or any questions.
#
# INVENTORY LAYOUT (54 slots, 6 rows of 9):
#   Row 1:  0   1   2   3   4   5   6   7   8
#   Row 2:  9  10  11  12  13  14  15  16  17
#   Row 3: 18  19  20  21  22  23  24  25  26
#   Row 4: 27  28  29  30  31  32  33  34  35
#   Row 5: 36  37  38  39  40  41  42  43  44
#   Row 6: 45  46  47  48  49  50  51  52  53
#
# Event slots are fixed at 10-16, 19-25, 28-34 (21 per page).
# Slot 45 = Previous page  |  Slot 49 = Close  |  Slot 53 = Next page
# Slot  4 = Page indicator (only shown when there is more than 1 page)

# -----------------------------------------------------------------------
# TITLE shown at the top of the inventory
# Page number is appended automatically when there is more than one page.
# -----------------------------------------------------------------------
title: "&8&l✦ &8Events ➠ Overview"

# -----------------------------------------------------------------------
# FILLER ITEMS
# Fills background slots. Event, static, and nav slots overwrite these.
# -----------------------------------------------------------------------
filler-items:
  - material: GRAY_STAINED_GLASS_PANE
    name: " "
    slots:
      - 0-8       # top row
      - 9         # left edge row 2
      - 17        # right edge row 2
      - 18        # left edge row 3
      - 26        # right edge row 3
      - 27        # left edge row 4
      - 35        # right edge row 4
      - 36-44     # row 5
      - 45-53     # bottom row (nav slots overwrite 45, 49, 53)

# -----------------------------------------------------------------------
# STATIC SLOTS - fixed items always shown at specific positions.
# Avoid slots 45, 49, 53 (used by navigation) and 10-16, 19-25, 28-34
# (used by events).
# -----------------------------------------------------------------------
static-slots:

  49:
    material: BARRIER
    name: "&c&l✗ ᴄʟᴏꜱᴇ"
    lore:
      - "&7ᴄʟɪᴄᴋ ᴛᴏ ᴄʟᴏꜱᴇ ᴛʜɪꜱ ᴍᴇɴᴜ."

# -----------------------------------------------------------------------
# NAVIGATION BUTTONS
# Slot 45 = Previous page button (hidden / replaced by filler on page 1)
# Slot 53 = Next page button     (hidden / replaced by filler on last page)
# -----------------------------------------------------------------------
nav-prev-material: ARROW
nav-prev-name: "&e&l← ᴘʀᴇᴠɪᴏᴜꜱ"
nav-prev-lore:
  - "&7ᴄʟɪᴄᴋ ᴛᴏ ɢᴏ ᴛᴏ ᴛʜᴇ ᴘʀᴇᴠɪᴏᴜꜱ ᴘᴀɢᴇ."

nav-next-material: ARROW
nav-next-name: "&e&lɴᴇxᴛ →"
nav-next-lore:
  - "&7ᴄʟɪᴄᴋ ᴛᴏ ɢᴏ ᴛᴏ ᴛʜᴇ ɴᴇxᴛ ᴘᴀɢᴇ."

# -----------------------------------------------------------------------
# PAGE INDICATOR  (slot 4, top-centre row)
# Only shown when there is more than one page.
# Placeholders: {page}, {total}
# -----------------------------------------------------------------------
page-indicator-material: BOOK
page-indicator-name: "&7ᴘᴀɢᴇ &e{page} &7/ &e{total}"
page-indicator-lore:
  - "&8ᴜꜱᴇ ᴛʜᴇ ᴀʀʀᴏᴡꜱ ʙᴇʟᴏᴡ ᴛᴏ ɴᴀᴠɪɢᴀᴛᴇ."

# -----------------------------------------------------------------------
# EMPTY SLOT FILLER
# Shown in event slots that have no event on the current page.
# -----------------------------------------------------------------------
empty-slot-material: GRAY_DYE
empty-slot-name: "&7???"
empty-slot-lore: []

# -----------------------------------------------------------------------
# EVENT ITEM LORE TEMPLATE
# {description_lines} expands to all lines from events.yml description.
# {duration} is replaced with the formatted duration string.
# -----------------------------------------------------------------------
event-lore-template:
  - "{description_lines}"
  - ""
  - "&8&l⏱ &7ᴅᴜʀᴀᴛɪᴏɴ: &e{duration}"

# -----------------------------------------------------------------------
# ACTIVE EVENT BADGE  (appended to lore when the event is running)
# -----------------------------------------------------------------------
active-event-badge:
  - ""
  - "&a&l▶ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ"

# -----------------------------------------------------------------------
# ACTIVE EVENT GLOW
# -----------------------------------------------------------------------
active-event-glow: true

# -----------------------------------------------------------------------
# EVENT ICONS  (maps event IDs to their GUI item material)
# Falls back to PAPER for any event not listed.
# -----------------------------------------------------------------------
event-icons:
  meteor_shower:     FIRE_CHARGE
  ore_frenzy:        DIAMOND
  tornado_trouble:   FEATHER
  blood_moon:        REDSTONE
  gravity_glitch:    END_CRYSTAL
  lightning_storm:   LIGHTNING_ROD
  speed_surge:       SUGAR
  freezing_winds:    SNOWBALL
  creeper_panic:     CREEPER_HEAD
  xp_rain:           EXPERIENCE_BOTTLE
  golden_touch:      GOLD_INGOT
  healing_aura:      GLISTERING_MELON_SLICE
  toxic_wasteland:   SLIME_BALL
  lucky_day:         EMERALD
  earthquake:        STONE
  ender_disturbance: ENDER_EYE
  rich_soil:         HAY_BLOCK
  slime_invasion:    LIME_DYE
  echoing_darkness:  SCULK_SHRIEKER
  treasure_spark:    AMETHYST_SHARD
  bunny_hop:         RABBIT_FOOT
  scorching_sun:     BLAZE_POWDER
  mob_blessing:      WHEAT
  emerald_fever:     EMERALD_BLOCK